<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NOM App ⚡</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0b111e; color: #f8fafc; font-family: sans-serif; }</style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">
    <div id="menu-container" class="w-full max-w-2xl mt-16 text-center">
        <h1 class="text-2xl font-bold text-blue-400 mb-8">⚡ NOM tabla 310 y 250 ⚡</h1>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <button onclick="startSupervivencia('310')" class="bg-blue-600 p-6 rounded-2xl text-white font-bold">Estudiar Ampacidad</button>
            <button onclick="startSupervivencia('250')" class="bg-indigo-600 p-6 rounded-2xl text-white font-bold">Estudiar Puesta a Tierra</button>
        </div>
    </div>

    <main id="game-container" class="hidden w-full max-w-3xl mt-4 bg-slate-900/40 p-6 rounded-2xl shadow-2xl border border-slate-800">
        <div class="flex justify-between mb-6 items-center">
            <h1 id="game-title" class="font-bold text-slate-200">Simulador</h1>
            <button onclick="backToMenu()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 py-1.5 px-4 rounded-lg text-xs font-bold">⬅️ Menú</button>
        </div>
        <div id="quiz-interface">
            <div class="bg-slate-950/60 p-6 mb-6 flex justify-between items-center rounded-xl border border-slate-800">
                <div><span class="text-[10px] text-slate-500 block font-bold uppercase tracking-widest">CORRIENTE:</span><div id="target-value" class="text-3xl font-black text-blue-500 tracking-tight">--</div></div>
                <div id="target-condition" class="text-xl font-bold text-slate-300">--</div>
            </div>
            <div id="matrix-container" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-2 mb-6"></div>
            <div id="fast-feedback" class="hidden mb-4 p-3 bg-rose-950/40 border border-rose-900/60 text-center rounded-xl text-rose-200 text-[11px] font-bold"></div>
            <div class="flex justify-between border-t border-slate-800 pt-4 px-1">
                <div><span class="block text-[10px] uppercase font-black text-slate-500 tracking-widest">Racha</span><span id="score-text" class="text-2xl font-black text-amber-400">0</span></div>
                <div class="text-right"><span class="block text-[10px] uppercase font-black text-slate-500 tracking-widest">Récord</span><span id="best-text" class="text-2xl font-black text-emerald-400">0</span></div>
            </div>
        </div>
    </main>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
        const listaCalibres = ["14 AWG", "12 AWG", "10 AWG", "8 AWG", "6 AWG", "4 AWG", "3 AWG", "2 AWG", "1 AWG", "1/0 AWG", "2/0 AWG", "3/0 AWG", "4/0 AWG", "250 kcmil", "300 kcmil", "350 kcmil", "400 kcmil", "500 kcmil"];
        const tabla310 = [{ calibre: "14 AWG", "60": 15, "75": 20 }, { calibre: "12 AWG", "60": 20, "75": 25 }, { calibre: "10 AWG", "60": 30, "75": 35 }, { calibre: "8 AWG", "60": 40, "75": 50 }, { calibre: "6 AWG", "60": 55, "75": 65 }, { calibre: "4 AWG", "60": 70, "75": 85 }, { calibre: "3 AWG", "60": 85, "75": 100 }, { calibre: "2 AWG", "60": 95, "75": 115 }, { calibre: "1 AWG", "60": 110, "75": 130 }, { calibre: "1/0 AWG", "60": 125, "75": 150 }, { calibre: "2/0 AWG", "60": 145, "75": 175 }, { calibre: "3/0 AWG", "60": 165, "75": 200 }, { calibre: "4/0 AWG", "60": 195, "75": 230 }, { calibre: "250 kcmil", "60": 215, "75": 255 }, { calibre: "300 kcmil", "60": 240, "75": 285 }, { calibre: "350 kcmil", "60": 260, "75": 310 }, { calibre: "400 kcmil", "60": 280, "75": 335 }, { calibre: "500 kcmil", "60": 320, "75": 380 }];
        const tabla250 = [{ calibre: "14 AWG", maxAmperes: 15 }, { calibre: "12 AWG", maxAmperes: 20 }, { calibre: "10 AWG", maxAmperes: 60 }, { calibre: "8 AWG", maxAmperes: 100 }, { calibre: "6 AWG", maxAmperes: 200 }, { calibre: "4 AWG", maxAmperes: 300 }, { calibre: "3 AWG", maxAmperes: 400 }, { calibre: "2 AWG", maxAmperes: 500 }, { calibre: "1 AWG", maxAmperes: 600 }, { calibre: "1/0 AWG", maxAmperes: 800 }, { calibre: "2/0 AWG", maxAmperes: 1000 }, { calibre: "3/0 AWG", maxAmperes: 1200 }, { calibre: "4/0 AWG", maxAmperes: 1600 }, { calibre: "250 kcmil", maxAmperes: 2000 }, { calibre: "350 kcmil", maxAmperes: 3000 }, { calibre: "400 kcmil", maxAmperes: 4000 }, { calibre: "500 kcmil", maxAmperes: 6000 }];
        let modeActive = "310", racha = 0, record310 = 0, record250 = 0, corrienteActual = 0, tempActual = "60";
        function startSupervivencia(tipo) { modeActive = tipo; document.getElementById("menu-container").classList.add("hidden"); document.getElementById("game-container").classList.remove("hidden"); racha = 0; initQuiz(); }
        function backToMenu() { document.getElementById("game-container").classList.add("hidden"); document.getElementById("menu-container").classList.remove("hidden"); }
        function initQuiz() { renderButtons(); generarEjercicioInfinito(); }
        function renderButtons() {
            const container = document.getElementById("matrix-container"); container.innerHTML = "";
            listaCalibres.forEach(calibre => {
                const btn = document.createElement("button"); btn.className = "bg-slate-800 hover:bg-slate-700 font-bold py-3 rounded-lg text-xs text-white transition";
                btn.innerText = calibre; btn.onclick = () => verificarRespuesta(calibre, btn); container.appendChild(btn);
            });
        }
        function generarEjercicioInfinito() {
            if (modeActive === "310") {
                document.getElementById("game-title").innerText = "Tabla 310.15(B)(16)"; tempActual = Math.random() > 0.5 ? "60" : "75";
                corrienteActual = Math.floor(Math.random() * 370) + 5; document.getElementById("target-condition").innerText = tempActual + "°C";
            } else {
                document.getElementById("game-title").innerText = "Tabla 250.122";
                corrienteActual = Math.floor(Math.random() * 5900) + 10; document.getElementById("target-condition").innerText = "Tierra (Cu)";
            }
            document.getElementById("target-value").innerText = corrienteActual + " A";
        }
        function verificarRespuesta(sel, btn) {
            const feedback = document.getElementById("fast-feedback");
            let cap = modeActive === "310" ? tabla310.find(i => i.calibre === sel)[tempActual] : tabla250.find(i => i.calibre === sel).maxAmperes;
            if (cap >= corrienteActual) {
                racha++; if(modeActive=="310" ? racha>record310 : racha>record250) { modeActive=="310" ? record310=racha : record250=racha; }
                document.getElementById("score-text").innerText = racha; document.getElementById("best-text").innerText = modeActive=="310"?record310:record250;
                feedback.classList.add("hidden"); setTimeout(generarEjercicioInfinito, 300);
            } else {
                racha = 0; document.getElementById("score-text").innerText = 0;
                feedback.innerText = "Error: Calibre insuficiente."; feedback.classList.remove("hidden");
                setTimeout(generarEjercicioInfinito, 1500);
            }
        }
    </script>
</body>
</html>
